body:
  text: 邑主禪師舜象主劉夫明明萬象仰之誰得其攸攸兆庶俯之熟測其際唯大靈尊威神無量籠括空有獨在環中演三乘於苦海為衆生之梁棟隨六道之去來示北首於雙林其有舜禪師者間居味捨苦樂於一心據披無罦恆方便以開導欲使未曾有法給荼心無緣之慈引其鄙意復有劉洪安劉專劉嶠常劉獻伯劉黑等性與天道直置慍不改其容榮辱何關在鷲鸑之長歎慨羅預之見損傷慧日傳痛金棺於長夜遂率宗門一百餘人共興攝之心俱起天之念欲令甘露久光金河盡法幢更暉慧炬復照即敬造西方阿彌陀像并觀音大勢白毫宛轉與五山如爭隆青目分明共四海如競朗一一相好不得兼二以觀之頌德弗間豈復更於餘偈將知巍巍難量猶山玉之對川長唐唐易睹若二日之現華池昔不傾不動由木如往生不穢不濁因聚沙之微業況功同石神等育王豈使催時之獸虛馳如往返減算之禽空驟於去來乃為頌曰二儀覆載万品有緣受業各異感果相牽御龍奕世英倫比肩刻作能仁相好殊妍昞若畫石猶月升天飾沾及無邊四恩九居茲福田慈氏三會上首俱前之金石斯年大齊武平元年歲在攝提星月寶鐘經始故記之大施主劉
